{% extends "base.html" %}
{% block title %}Eliminar post — InkBlog{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6">
    <div class="form-card text-center">
      <span style="font-size:3.5rem;color:var(--accent)"><i class="bi bi-exclamation-triangle-fill"></i></span>
      <h2 class="h4 mt-3 mb-2">¿Eliminar este post?</h2>
      <p class="text-muted mb-1">Estás a punto de eliminar permanentemente:</p>
      <p class="fw-semibold fs-5 mb-4">"{{ post.titulo }}"</p>
      <div class="alert alert-danger text-start py-2 mb-4"><i class="bi bi-info-circle me-1"></i>Esta acción <strong>no se puede deshacer</strong>.</div>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
          <button type="submit" class="btn btn-danger px-4 fw-semibold"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
          <a href="{{ post.get_absolute_url }}" class="btn btn-outline-ink px-4">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
